<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthSeeker | AI Fake News Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2.0">
</head>

<body>
    <div class="container">
        <header>
            <h1>TruthSeeker AI</h1>
            <p>Next-Generation Fake News Detection Powered by Gemini</p>
        </header>

        {% if error %}
        <div class="alert error">
            {{ error }}
        </div>
        {% endif %}

        <main>
            <div class="card">
                <form action="/analyze" method="POST">
                    <div class="tab-container">
                        <button type="button" class="tab active" onclick="switchTab('url')">Link Analysis</button>
                        <button type="button" class="tab" onclick="switchTab('text')">Text Analysis</button>
                    </div>

                    <div id="url-input" class="input-group">
                        <label for="url">Paste News Article Web Link</label>
                        <input type="url" name="url" id="url" placeholder="https://www.cnn.com/news/article...">
                    </div>

                    <div id="text-input" class="input-group" style="display: none;">
                        <label for="text">Or Paste Article Raw Content</label>
                        <textarea name="text" id="text" rows="7"
                            placeholder="Paste the full paragraph or content of the news article here..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary" id="analyze-btn">
                        Initialize AI Analysis
                    </button>
                </form>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 TruthSeeker Platform. Analyzing misinformation with Advanced AI.</p>
        </footer>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.input-group').forEach(g => {
                g.style.opacity = '0';
                setTimeout(() => g.style.display = 'none', 150);
            });

            setTimeout(() => {
                if (tab === 'url') {
                    document.querySelector('[onclick="switchTab(\'url\')"]').classList.add('active');
                    const el = document.getElementById('url-input');
                    el.style.display = 'block';
                    setTimeout(() => el.style.opacity = '1', 10);
                    document.getElementById('text').value = '';
                } else {
                    document.querySelector('[onclick="switchTab(\'text\')"]').classList.add('active');
                    const el = document.getElementById('text-input');
                    el.style.display = 'block';
                    setTimeout(() => el.style.opacity = '1', 10);
                    document.getElementById('url').value = '';
                }
            }, 150);
        }

        // Add loading state to button when form is submitted
        document.querySelector('form').addEventListener('submit', function () {
            const btn = document.getElementById('analyze-btn');
            btn.innerHTML = 'Analyzing Context... <svg style="display:inline; animation:spin 1s cubic-bezier(0.5, 0.2, 0.5, 0.8) infinite; margin-left: 10px;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" stroke-opacity="0.3"></circle><path d="M12 2a10 10 0 0 1 10 10"></path></svg>';
            btn.style.opacity = '0.9';
            btn.style.pointerEvents = 'none';
        });

        // Inject simple keyframe for spinner since it's only used here
        const style = document.createElement('style');
        style.innerHTML = '@keyframes spin { 100% { transform: rotate(360deg); } }';
        document.head.appendChild(style);
    </script>
</body>

</html>
